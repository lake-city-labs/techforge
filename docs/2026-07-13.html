<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechForge Briefing — 2026-07-13</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --text: #e5e5e5;
            --muted: #9ca3af;
            --accent: #3b82f6;
            --secondary: #161616;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            padding: 28px 20px 48px;
        }

        .container {
            max-width: 780px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 36px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 650;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .date {
            color: var(--muted);
            font-size: 0.95rem;
        }

        h2 {
            font-size: 1.25rem;
            margin: 36px 0 14px;
            color: #fff;
            letter-spacing: -0.01em;
        }

        section {
            margin-bottom: 28px;
        }

        p {
            margin: 0 0 14px;
            color: var(--text);
        }

        .signal {
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 18px 18px 16px;
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .signal h3 {
            font-size: 1.05rem;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 600;
            line-height: 1.35;
        }

        .signal ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 10px;
        }

        .signal li {
            color: #d4d4d4;
        }

        .signal li strong {
            color: #fff;
            font-weight: 600;
        }

        .implications {
            font-style: italic;
            color: #b7b7b7;
            border-left: 3px solid var(--accent);
            padding: 8px 0 8px 14px;
            margin: 4px 0;
        }

        .sources {
            font-size: 0.85rem;
            color: #777;
            margin-top: 12px;
        }

        .plain-list {
            list-style: disc;
            padding-left: 1.25rem;
            display: grid;
            gap: 10px;
            color: #d4d4d4;
        }

        .plain-list li {
            padding-left: 0.15rem;
        }

        footer {
            margin-top: 56px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: #666;
        }

        @media (max-width: 600px) {
            body {
                padding: 18px 14px 36px;
            }

            h1 {
                font-size: 1.55rem;
            }

            .signal {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TechForge Briefing</h1>
            <div class="date">2026-07-13</div>
        </header>

        <div class="content">
        <section>
        <p>[ERROR] Failed to generate briefing with Grok: 'latin-1' codec can't encode character '\u2026' in position 13: ordinal not in range(256)</p>
        <p>Fallback placeholder briefing would go here.</p>
        </section>
        </div>

        <footer>
            Generated by TechForge • 2026-07-13
        </footer>
    </div>
</body>
</html>
