name: Deploy TechForge Briefing
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy latest briefing to index.html
        run: |
          latest=$(ls -t artifacts/tech-digests/*.html 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            cp "$latest" index.html
            cp "$latest" docs/index.html
            echo "Copied $latest to index.html and docs/index.html"
          else
            echo "No digest found"
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
